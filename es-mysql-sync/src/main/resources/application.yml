spring:
  application:
    name: es-mysql-sync
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://100.64.0.8:3306/muc_test?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    # HikariCP 连接池核心配置（生产推荐）
    hikari:
      # 连接池名称（方便监控）
      pool-name: HikariCP-Pool
      # 最小空闲连接数（推荐 = 最大连接数，Hikari 作者建议固定连接数）
      minimum-idle: 10
      # 最大连接数（核心！根据服务器性能调整，一般 10~20）
      maximum-pool-size: 10
      # 自动提交事务（默认 true）
      auto-commit: true
      # 空闲连接超时时间（毫秒），默认 600000（10分钟）
      idle-timeout: 600000
      # 连接最大生命周期（毫秒），比数据库 wait_timeout 短一点
      max-lifetime: 1800000
      # 连接超时时间（毫秒）：从连接池获取连接的最大等待时间
      connection-timeout: 30000
      # 心跳检测 SQL（验证连接是否有效）
      connection-test-query: SELECT 1
      # 心跳检测间隔（毫秒）
      keepalive-time: 30000

  rabbitmq:
    host: 100.64.0.8
    port: 5672
    username: root
    password: root
    virtual-host: /
    publisher-confirm-type: correlated # 开启生产者确认
    publisher-returns: true # 开启消息返回
    template:
      mandatory: true # 启用强制消息路由
    listener:
      simple:
        acknowledge-mode: manual # 开启手动确认
        retry:
          enabled: true
          max-attempts: 3 # 最大重试次数
          initial-interval: 1000ms # 重试间隔

  data:
    redis:
      host: 100.64.0.8
      port: 6379
      database: 0

mybatis-plus:
  configuration:
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  mapper-locations: classpath*:/mapper/**/*.xml

knife4j:
  enable: true
  setting:
    language: zh_cn
  openapi:
    info:
      title: ES MySQL Sync API
      description: MySQL to Elasticsearch 同步服务接口文档
      version: 1.0.0
      contact:
        name: felix
    terms-of-service-url: https://www.apache.org/licenses/LICENSE-2.0

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
